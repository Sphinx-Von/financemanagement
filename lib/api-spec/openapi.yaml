openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Finance Data Processing and Access Control API

servers:
  - url: /api
    description: Base API path

tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication and session management
  - name: users
    description: User and role management
  - name: records
    description: Financial records management
  - name: dashboard
    description: Dashboard summary analytics
  - name: rental
    description: Rental property and payments

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with username and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout current session
      responses:
        "200":
          description: Logout successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all users (Admin only)
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createUser
      tags: [users]
      summary: Create a new user (Admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserBody"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Username already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/{id}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get a user by ID (Admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateUser
      tags: [users]
      summary: Update a user (Admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserBody"
      responses:
        "200":
          description: User updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteUser
      tags: [users]
      summary: Delete a user (Admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: User deleted
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /records:
    get:
      operationId: listRecords
      tags: [records]
      summary: List financial records with optional filters
      parameters:
        - name: type
          in: query
          required: false
          schema:
            type: string
            enum: [income, expense]
        - name: category
          in: query
          required: false
          schema:
            type: string
        - name: dateFrom
          in: query
          required: false
          schema:
            type: string
        - name: dateTo
          in: query
          required: false
          schema:
            type: string
        - name: page
          in: query
          required: false
          schema:
            type: integer
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Paginated list of financial records
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecordListResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createRecord
      tags: [records]
      summary: Create a financial record (Admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRecordBody"
      responses:
        "201":
          description: Record created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Record"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /records/{id}:
    get:
      operationId: getRecord
      tags: [records]
      summary: Get a financial record by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Record found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Record"
        "404":
          description: Record not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateRecord
      tags: [records]
      summary: Update a financial record (Admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRecordBody"
      responses:
        "200":
          description: Record updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Record"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Record not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteRecord
      tags: [records]
      summary: Soft-delete a financial record (Admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Record deleted
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Record not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get overall financial summary
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /dashboard/category-totals:
    get:
      operationId: getCategoryTotals
      tags: [dashboard]
      summary: Get totals grouped by category (Analyst and Admin)
      responses:
        "200":
          description: Category totals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CategoryTotal"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /dashboard/monthly-trends:
    get:
      operationId: getMonthlyTrends
      tags: [dashboard]
      summary: Get monthly income/expense trends (Analyst and Admin)
      parameters:
        - name: months
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Monthly trends
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MonthlyTrend"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /dashboard/recent-activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      summary: Get recent financial activity
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Recent activity records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Record"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /dashboard/tenants:
    get:
      operationId: getTenantDashboard
      tags: [dashboard]
      summary: Get tenant rental overview (Analyst and Admin)
      responses:
        "200":
          description: Tenant rental overview
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TenantRentalRow"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /rental/setup:
    post:
      operationId: createRentalSetup
      tags: [rental]
      summary: Save rental property and payment details
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRentalSetupBody"
      responses:
        "201":
          description: Rental setup saved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    LoginBody:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
      required:
        - username
        - password

    LoginResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"
      required:
        - token
        - user

    User:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [viewer, analyst, admin]
        status:
          type: string
          enum: [active, inactive]
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - username
        - email
        - role
        - status
        - createdAt
        - updatedAt

    CreateUserBody:
      type: object
      properties:
        username:
          type: string
        email:
          type: string
        password:
          type: string
        role:
          type: string
          enum: [viewer, analyst, admin]
      required:
        - username
        - email
        - password
        - role

    UpdateUserBody:
      type: object
      properties:
        email:
          type: string
        role:
          type: string
          enum: [viewer, analyst, admin]
        status:
          type: string
          enum: [active, inactive]
        password:
          type: string

    Record:
      type: object
      properties:
        id:
          type: integer
        amount:
          type: number
        type:
          type: string
          enum: [income, expense]
        category:
          type: string
        date:
          type: string
        notes:
          type:
            - string
            - "null"
        deletedAt:
          type:
            - string
            - "null"
        createdAt:
          type: string
        updatedAt:
          type: string
        createdById:
          type: integer
      required:
        - id
        - amount
        - type
        - category
        - date
        - notes
        - deletedAt
        - createdAt
        - updatedAt
        - createdById

    RecordListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Record"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        totalPages:
          type: integer
      required:
        - data
        - total
        - page
        - limit
        - totalPages

    CreateRecordBody:
      type: object
      properties:
        amount:
          type: number
        type:
          type: string
          enum: [income, expense]
        category:
          type: string
        date:
          type: string
        notes:
          type: string
      required:
        - amount
        - type
        - category
        - date

    UpdateRecordBody:
      type: object
      properties:
        amount:
          type: number
        type:
          type: string
          enum: [income, expense]
        category:
          type: string
        date:
          type: string
        notes:
          type: string

    DashboardSummary:
      type: object
      properties:
        totalIncome:
          type: number
        totalExpenses:
          type: number
        netBalance:
          type: number
        totalRecords:
          type: integer
        incomeCount:
          type: integer
        expenseCount:
          type: integer
      required:
        - totalIncome
        - totalExpenses
        - netBalance
        - totalRecords
        - incomeCount
        - expenseCount

    CategoryTotal:
      type: object
      properties:
        category:
          type: string
        type:
          type: string
          enum: [income, expense]
        total:
          type: number
        count:
          type: integer
      required:
        - category
        - type
        - total
        - count

    MonthlyTrend:
      type: object
      properties:
        month:
          type: string
        income:
          type: number
        expenses:
          type: number
        net:
          type: number
      required:
        - month
        - income
        - expenses
        - net

    TenantRentalRow:
      type: object
      properties:
        userId:
          type: integer
        username:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [viewer, analyst, admin]
        status:
          type: string
          enum: [active, inactive]
        propertyName:
          type:
            - string
            - "null"
        fullAddress:
          type:
            - string
            - "null"
        unitNumber:
          type:
            - string
            - "null"
        floor:
          type:
            - string
            - "null"
        propertyType:
          type:
            - string
            - "null"
        furnishingStatus:
          type:
            - string
            - "null"
        amenities:
          type:
            - array
            - "null"
          items:
            type: string
        dueDate:
          type:
            - string
            - "null"
        paymentDate:
          type:
            - string
            - "null"
        amountPaid:
          type:
            - number
            - "null"
        paymentMethod:
          type:
            - string
            - "null"
        transactionId:
          type:
            - string
            - "null"
        lateFees:
          type:
            - number
            - "null"
        outstandingBalance:
          type:
            - number
            - "null"
        paymentStatus:
          type:
            - string
            - "null"
          enum: [paid, unpaid, overdue, null]
      required:
        - userId
        - username
        - email
        - role
        - status

    CreateRentalSetupBody:
      type: object
      properties:
        property:
          $ref: "#/components/schemas/CreatePropertyBody"
        payment:
          $ref: "#/components/schemas/CreatePaymentBody"
      required:
        - property
        - payment

    CreatePropertyBody:
      type: object
      properties:
        propertyName:
          type: string
        fullAddress:
          type: string
        unitNumber:
          type: string
        floor:
          type: string
        propertyType:
          type: string
          enum: [apartment, pg, villa, other]
        furnishingStatus:
          type: string
          enum: [furnished, semi_furnished, unfurnished]
        amenities:
          type: array
          items:
            type: string
      required:
        - propertyName
        - fullAddress
        - unitNumber
        - floor
        - propertyType
        - furnishingStatus
        - amenities

    CreatePaymentBody:
      type: object
      properties:
        dueDate:
          type: string
        paymentDate:
          type:
            - string
            - "null"
        amountPaid:
          type: number
        paymentMethod:
          type:
            - string
            - "null"
          enum: [upi, bank_transfer, cash, card, other, null]
        transactionId:
          type:
            - string
            - "null"
        lateFees:
          type: number
        outstandingBalance:
          type: number
        paymentStatus:
          type: string
          enum: [paid, unpaid, overdue]
      required:
        - dueDate
        - amountPaid
        - lateFees
        - outstandingBalance
        - paymentStatus